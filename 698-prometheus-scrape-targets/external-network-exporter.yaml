apiVersion: v1
kind: Service
metadata:
  namespace: prometheus
  name: external-network-exporter
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - protocol: TCP
      port: 9427
      targetPort: 9427
---
apiVersion: v1
kind: Endpoints
metadata:
  namespace: prometheus
  name: external-network-exporter
subsets:
  - addresses:
      - ip: "14.225.1.214" # orisis
    ports:
      - port: 9427
        protocol: TCP
