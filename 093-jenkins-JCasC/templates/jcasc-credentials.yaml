credentials:
  system:
    domainCredentials:
      - credentials:
          - idTokenFile:
              id: gcp-oidc-id-token
              scope: GLOBAL
              audience: "https://iam.googleapis.com/projects/474326114337/locations/global/workloadIdentityPools/jenkins/providers/jenkins-tuana9a-com"
          - idTokenFile:
              id: aws-oidc-id-token
              scope: GLOBAL
              audience: "sts.amazonaws.com"
          - string:
              scope: GLOBAL
              id: "VAULT_TOKEN"
              secret: "${VAULT_TOKEN}"
              description: "secrets-operator vault token"
          - string:
              scope: GLOBAL
              id: "TELEGRAM_CHAT_ID"
              secret: "${TELEGRAM_CHAT_ID}"
              description: "TELEGRAM_CHAT_ID"
          - string:
              scope: GLOBAL
              id: "TELEGRAM_BOT_TOKEN"
              secret: "${TELEGRAM_BOT_TOKEN}"
              description: "TELEGRAM_BOT_TOKEN"
          - file:
              scope: GLOBAL
              id: "vault-unseal-keys.env"
              fileName: "vault-unseal-keys.env"
              secretBytes: "${vault-unseal-keys-env-b64}"
          - file:
              scope: GLOBAL
              id: "vault-backup.env"
              fileName: "vault-backup.env"
              secretBytes: "${vault-backup-env-b64}"
          - file:
              scope: GLOBAL
              id: "backup-coder-db.env"
              fileName: "backup-coder-db.env"
              secretBytes: "${backup-coder-db-env-b64}"
          - file:
              scope: GLOBAL
              id: "k8s-backup.env"
              fileName: "k8s-backup.env"
              secretBytes: "${k8s-backup-env-b64}"
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: id_rsa
              username: u
              description: "ci/id_rsa"
              privateKeySource:
                directEntry:
                  privateKey: "${id_rsa}"
