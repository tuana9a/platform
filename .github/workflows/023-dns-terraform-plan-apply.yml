name: "023-dns"

on:
  workflow_dispatch:
  push:
    paths:
      - "023-dns/**"
      - ".github/workflows/023-dns-terraform-plan-apply*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      WORKING_DIR: ${{ github.workflow }}
      download-secret-files: true
    secrets: inherit