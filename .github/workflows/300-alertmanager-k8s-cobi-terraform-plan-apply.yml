name: "300-alertmanager-k8s-cobi"

on:
  workflow_dispatch:
  push:
    paths:
      - "300-alertmanager-k8s-cobi/**"
      - ".github/workflows/300-alertmanager-k8s-cobi-terraform-plan-apply*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      runs-on: self-hosted-0
      install-sops: true
      WORKING_DIR: ${{ github.workflow }}
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
    secrets: inherit