apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bm-utils
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-tuana9a-com
    kind: ClusterSecretStore
  target:
    name: bm-utils
  dataFrom:
    - extract:
        key: bm-utils
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bm-utils
data:
  PORT: "5000"
  BASE_URL: https://utils.bm.tuana9a.com
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bm-utils
spec:
  serviceName: bm-utils
  replicas: 1
  selector:
    matchLabels:
      app: bm-utils
  template:
    metadata:
      labels:
        app: bm-utils
    spec:
      securityContext:
        fsGroup: 101 # uid=100(appuser) gid=101(appgroup) groups=101(appgroup)
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: bm-utils
          image: tuana9a/bm-utils:git-2ddaaa9d51b54adbf8bf14f04dd894e89b2d906d
          envFrom:
            - configMapRef:
                name: bm-utils
            - secretRef:
                name: bm-utils
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "100Mi"
          volumeMounts:
            - name: workdir
              mountPath: /app/workdir.tmp
  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: proxmox-data-xfs
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: bm-utils
spec:
  selector:
    app: bm-utils
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bm-utils
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m" # max upload size
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - utils.bm.tuana9a.com
      secretName: utils-bm-tuana9a-com-tls
  rules:
    - host: utils.bm.tuana9a.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: bm-utils
                port:
                  number: 5000
