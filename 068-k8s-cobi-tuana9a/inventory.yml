DO_NOT_USE: # NOTE: storing common variables
  hosts:
    localhost:
      kube_pki: &kube_pki
        - /etc/kubernetes/pki/ca.crt
        - /etc/kubernetes/pki/ca.key
        - /etc/kubernetes/pki/sa.key
        - /etc/kubernetes/pki/sa.pub
        - /etc/kubernetes/pki/front-proxy-ca.crt
        - /etc/kubernetes/pki/front-proxy-ca.key
        - /etc/kubernetes/pki/etcd/ca.crt
        - /etc/kubernetes/pki/etcd/ca.key
      kubevip: &kubevip
        inf: eth0
        vip: 192.168.56.21
      authorized_keys: &authorized_keys
        - key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6bF/SOzb1XD4qo0LaZ5PVa1sCijDyQS/8oHZe9x6R5"
          comment: "ci"
          user: root
      kubernetes_major_version: &kubernetes_major_version "1.33"
      kubernetes_minor_version: &kubernetes_minor_version "1.33.10"
      cluster_ops: &cluster_ops
        # some operation required taking variable from control plane like:
        # - getting kube_pki
        # - kube join command
        # each data node having this variable will be able to reference control plane via hostvars, example: "hostvars[cluster_ops.host].kube_join_command"
        host: 192.168.56.22
        remove_hosts:
          - 192.168.56.39
      gateway_ip: &gateway_ip 192.168.56.1
      cloudimg: &cloudimg debian-12-generic-amd64-20251129-2311.img

      k8s_node_defaults: &k8s_node_defaults
        pve_cluster: "alien"
        pve_node: "neomorph"
        cloudimg: *cloudimg
        pve_network_device: "vmbr0"
        gateway_ip: *gateway_ip
        authorized_keys: *authorized_keys
        # ----
        cluster_ops: *cluster_ops
        # ----
        kubernetes_major_version: *kubernetes_major_version
        kubernetes_minor_version: *kubernetes_minor_version

      control_plane_defaults: &control_plane_defaults
        <<: *k8s_node_defaults
        roles:
          - control-plane
        corecount: 2
        memsize: 4096
        kube_pki: *kube_pki
        kubevip: *kubevip
      data_plane_defaults: &data_plane_defaults
        <<: *k8s_node_defaults
        roles:
          - data-plane
        corecount: 4
        memsize: 12288
k8s_cluster:
  hosts:
    # --- CONTROL PLANE ---
    192.168.56.22: &i-122
      <<: *control_plane_defaults
      ansible_user: u
      vmid: 122
      nodename: i-122
      pve_node: "engineer"
      upgrade:
        batch: batch1
        skip_phases: ["kube-proxy"] # TODO: test this next time
    192.168.56.23: &i-123
      <<: *control_plane_defaults
      ansible_user: u
      vmid: 123
      pve_node: "engineer"
      nodename: i-123
      upgrade:
        batch: batch2
        skip_phases: ["kube-proxy"] # TODO: test this next time
    192.168.56.24: &i-124
      <<: *control_plane_defaults
      ansible_user: u
      vmid: 124
      pve_node: "engineer"
      nodename: i-124
      upgrade:
        batch: batch3
        skip_phases: ["kube-proxy"] # TODO: test this next time

    # --- DATA PLANE ---
    192.168.56.37: &i-137
      <<: *data_plane_defaults
      ansible_user: u
      nodename: i-137
      vmid: 137
      upgrade:
        batch: batch4
        skip_phases: ["kube-proxy"]
      wireguard_clients:
        - file: i-137.conf
          name: i-137
    192.168.56.38: &i-138
      <<: *data_plane_defaults
      ansible_user: u
      nodename: i-138
      vmid: 138
      upgrade:
        batch: batch5
        skip_phases: ["kube-proxy"]
      wireguard_clients:
        - file: i-138.conf
          name: i-138
