name: "003-aws-sso-iam"

on:
  workflow_dispatch:
  push:
    paths:
      - "003-aws-sso-iam/**"
      - ".github/workflows/003-aws-sso-iam*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      WORKING_DIR: ${{ github.workflow }}
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
    secrets: inherit
