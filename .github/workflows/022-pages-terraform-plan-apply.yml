name: "022-pages"

on:
  workflow_dispatch:
  push:
    paths:
      - "022-pages/**"
      - ".github/workflows/022-pages-terraform-plan-apply*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      WORKING_DIR: ${{ github.workflow }}
      download-secret-files: true
    secrets: inherit