apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: t9stbot
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-tuana9a-com
    kind: ClusterSecretStore
  target:
    name: t9stbot
  dataFrom:
    - extract:
        key: t9stbot/env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: t9stbot
data:
  BIND_ADDRESS: 0.0.0.0
  PORT: "8080"
  TELEGRAM_AVAILABLE_COMMANDS: chatid,myid,help
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: t9stbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: t9stbot
  template:
    metadata:
      labels:
        app: t9stbot
    spec:
      initContainers:
        - name: set-commands
          image: tuana9a/t9stbot:git-7bcb17788a2c8b0477610a294836aa7b4d209caf
          envFrom:
            - configMapRef:
                name: t9stbot
            - secretRef:
                name: t9stbot
          command: ["node", "set_my_commands.js"]
        - name: set-webhook
          image: tuana9a/t9stbot:git-7bcb17788a2c8b0477610a294836aa7b4d209caf
          envFrom:
            - configMapRef:
                name: t9stbot
            - secretRef:
                name: t9stbot
          command: ["node", "set_webhook.js"]
      containers:
        - name: t9stbot
          image: tuana9a/t9stbot:git-7bcb17788a2c8b0477610a294836aa7b4d209caf
          envFrom:
            - configMapRef:
                name: t9stbot
            - secretRef:
                name: t9stbot
          command: ["node", "main-webhook.js"]
---
apiVersion: v1
kind: Service
metadata:
  name: t9stbot
spec:
  selector:
    app: t9stbot
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: t9stbot
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - t9stbot.tuana9a.com
      secretName: t9stbot-tuana9a-com-tls
  rules:
    - host: t9stbot.tuana9a.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: t9stbot
                port:
                  number: 8080
