- name: uncordon kubernetes node
  become: true
  ansible.builtin.command: >
    kubectl uncordon {{ k8s_node_name }}
  register: kubectl_uncordon_result
  environment:
    KUBECONFIG: "{{ kubeconfig | default('/etc/kubernetes/admin.conf') }}"
  changed_when: kubectl_uncordon_result.rc == 0
  failed_when: kubectl_uncordon_result.rc != 0

- name: uncordon kubernetes node [stdout]
  debug:
    msg: "{{ kubectl_uncordon_result.stdout | split('\n') }}"

- name: uncordon kubernetes node [stderr]
  debug:
    msg: "{{ kubectl_uncordon_result.stderr | split('\n') }}"
