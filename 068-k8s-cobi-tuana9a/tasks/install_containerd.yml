- name: Set default containerd variables if not defined
  ansible.builtin.set_fact:
    containerd_version: "{{ containerd_version | default('2.2.3') }}"
    containerd_os: "{{ containerd_os | default('linux') }}"
    containerd_arch: "{{ containerd_arch | default('amd64') }}"

- name: Download containerd archive
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-{{ containerd_os }}-{{ containerd_arch }}.tar.gz"
    dest: "/opt/containerd-{{ containerd_version }}-{{ containerd_os }}-{{ containerd_arch }}.tar.gz"
    mode: "0644"

- name: Extract containerd to /usr/local
  become: true
  ansible.builtin.unarchive:
    src: "/opt/containerd-{{ containerd_version }}-{{ containerd_os }}-{{ containerd_arch }}.tar.gz"
    dest: "/usr/local"
    remote_src: yes
    # Optimization: prevents re-extraction if the main binary exists
    creates: "/usr/local/bin/containerd"

- name: Create containerd directory
  become: true
  ansible.builtin.file:
    path: "/etc/containerd"
    state: directory
    mode: "0755"

- name: write containerd.service file
  become: true
  ansible.builtin.template:
    src: templates/containerd.service
    dest: /lib/systemd/system/containerd.service
    owner: root
    group: root
    mode: "0644"

- name: write containerd config.toml file
  become: true
  ansible.builtin.template:
    src: templates/containerd/config.toml
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"

- name: start and enable containerd.service
  become: true
  ansible.builtin.systemd_service:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
