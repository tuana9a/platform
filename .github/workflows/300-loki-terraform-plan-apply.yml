name: "300-loki"

on:
  workflow_dispatch:
  push:
    paths:
      - "300-loki/**"
      - ".github/workflows/300-loki-terraform-plan-apply*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      runs-on: self-hosted-0
      WORKING_DIR: ${{ github.workflow }}
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
      download-secret-files: true
    secrets: inherit