name: "tuana9a-global-024-email"

on:
  workflow_dispatch:
  push:
    paths:
      - "tuana9a/global/024-email-routing/**"
      - ".github/workflows/tuana9a-global-024-email*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      install-sops: true
      WORKING_DIR: tuana9a/global/024-email-routing
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
    secrets: inherit
