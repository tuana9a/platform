apiVersion: v1
kind: Pod
spec:
  containers:
    - name: ubuntu
      image: tuana9a/ubuntu-24.04:2026.04.19
      command:
        - sleep
      args:
        - infinity
      volumeMounts:
        - name: workdir
          mountPath: "/workdir"
        - name: devops-tools
          mountPath: /devops
        - name: vault
          mountPath: /vault
        - name: postgres
          mountPath: /postgres
  volumes:
    - name: workdir
      emptyDir: {}
    - name: devops-tools
      image:
        reference: tuana9a/devops-tools:2026.04.19
        pullPolicy: IfNotPresent
    - name: vault
      image:
        reference: hashicorp/vault:1.17.2
        pullPolicy: IfNotPresent
    - name: postgres
      image:
        reference: postgres:16
        pullPolicy: IfNotPresent
