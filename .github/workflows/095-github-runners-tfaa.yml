name: "095-github-runners"

on:
  workflow_dispatch:
  push:
    paths:
      - "095-github-runners/**"
      - ".github/workflows/095-github-runners*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      install-sops: true
      WORKING_DIR: ${{ github.workflow }}
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
    secrets: inherit
