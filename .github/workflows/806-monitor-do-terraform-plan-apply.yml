name: "806-monitor-do"

on:
  workflow_dispatch:
  push:
    paths:
      - "806-monitor-do/**"
      - ".github/workflows/806-monitor-do-terraform-plan-apply*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      WORKING_DIR: ${{ github.workflow }}
      download-secret-files: true
    secrets: inherit