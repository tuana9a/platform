apiVersion: v1
kind: Pod
spec:
  containers:
    - name: ubuntu
      image: ubuntu:noble
      command:
        - sleep
      args:
        - infinity
      volumeMounts:
        - name: secrets
          mountPath: "/var/secrets"
          readOnly: true
        - name: workdir
          mountPath: "/workdir"
  volumes:
    - name: secrets
      secret:
        secretName: etcd-defrag
    - name: workdir
      emptyDir: {}
