name: "202-cert-manager-issuers"

on:
  workflow_dispatch:
  push:
    paths:
      - "202-cert-manager-issuers/**"
      - ".github/workflows/202-cert-manager-issuers-tfaa*"
    branches:
      - rock-n-roll

jobs:
  main:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tfaa.yml
    with:
      runs-on: self-hosted-0
      install-sops: true
      WORKING_DIR: ${{ github.workflow }}
      AWS_ASSUME_ROLE: arn:aws:iam::384588864907:role/github-workflow
    secrets: inherit